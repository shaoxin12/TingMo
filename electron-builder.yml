appId: com.tingmo.app
productName: 听墨
copyright: Copyright © 2025
directories:
  output: release
  buildResources: assets
files:
  - dist
  - dist-electron
  - node_modules
  - package.json
asar: false
win:
  target:
    - target: msi
      arch:
        - x64
  icon: assets/icons/icon.ico
msi:
  perMachine: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: TingMo
  artifactName: "TingMo-Setup-${version}.${ext}"
